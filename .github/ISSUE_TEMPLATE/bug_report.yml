name: Bug report
description: Report a defect or regression in FinanceTracker
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or behaving unexpectedly?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that trigger the problem.
      placeholder: "1. Open ...\n2. Click ...\n3. See ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Cashflow
        - AddEntry modal
        - Steuerbelege
        - OneDrive sync
        - AI / Cloudflare Worker
        - Mobile navigation
        - GitHub Actions / Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, browser/device details, or relevant data shape. Do not paste secrets.
